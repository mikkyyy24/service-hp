version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: servicehp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: servicehp123
    ports: ["5432:5432"]
  backend:
    build: ./server
    ports: ["3001:3001"]
    depends_on: [postgres]
  frontend:
    build: ./client  
    ports: ["3000:3000"]
